<title>APC Museum</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#f4f4f4;
}

h1{
    text-align:center;
    padding:20px;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

a{
    display:inline-block;
    margin-top:10px;
    padding:10px 15px;
    background:#222;
    color:white;
    text-decoration:none;
    border-radius:8px;
}

a:hover{
    background:#444;
}
</style>

</head>

<body>
