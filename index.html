<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APC Museum</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}

/* Top Bar */
.topbar{
    background:#111;
    padding:20px;
    text-align:center;
    border-bottom:1px solid #222;
}

.topbar h1{
    margin:0;
    font-size:28px;
}

.topbar p{
    margin:5px 0 0;
    color:#aaa;
}

/* Grid */
.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap:20px;
    padding:25px;
}

/* Card */
.card{
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
    border:1px solid #222;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.tag{
    display:inline-block;
    padding:4px 10px;
    background:#0077b6;
    border-radius:8px;
    font-size:12px;
    margin-bottom:10px;
}

a{
    display:inline-block;
    margin-top:10px;
    padding:10px 12px;
    background:#0077b6;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="topbar">
<h1>🏛️ APC Digital Fossil Museum</h1>
<p>Scientific Collection of Lebanese Fossils</p>
</div>

<div class="grid">

<!-- APC 000001 -->
<div class="card">
<img src="images/apc-000001.jpg">

<div class="content">
<span class="tag">Echinoidea</span>
<h2>APC-000001</h2>
<p>Cretaceous fossil from Hrajel</p>
<a href="pages/apc-000001.html">View Specimen</a>
</div>
</div>

<!-- APC 000002 -->
<div class="card">
<img src="images/apc-000002.jpg">

<div class="content">
<span class="tag">Echinoidea</span>
<h2>APC-000002</h2>
<p>Cretaceous fossil from Hrajel</p>
<a href="pages/apc-000002.html">View Specimen</a>
</div>
</div>

</div>

</body>
</html>
