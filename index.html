<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>APC Museum</title>

<style>
body{
    margin:0;
    font-family: Arial;
    background:#0f0f0f;
    color:white;
}

.topbar{
    text-align:center;
    padding:20px;
    background:#111;
    border-bottom:1px solid #222;
}

.filters{
    text-align:center;
    padding:15px;
}

button{
    margin:5px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:#0077b6;
    color:white;
}

button:hover{
    background:#023e8a;
}

.grid{
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap:20px;
    padding:25px;
}

.card{
    background:#1a1a1a;
    border-radius:12px;
    overflow:hidden;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-6px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.content{
    padding:15px;
}

.tag{
    display:inline-block;
    padding:4px 10px;
    background:#0077b6;
    border-radius:8px;
    font-size:12px;
    margin-bottom:10px;
}

a{
    display:inline-block;
    margin-top:10px;
    padding:10px 12px;
    background:#0077b6;
    color:white;
    text-decoration:none;
    border-radius:8px;
}
</style>

</head>

<body>

<div class="topbar">
<h1>🏛️ APC Digital Fossil Museum</h1>
<p>Lebanese Fossil Scientific Database</p>
</div>

<div class="filters">
<button onclick="filter('all')">All</button>
<button onclick="filter('echinoid')">Echinoids</button>
<button onclick="filter('gastropod')">Gastropods</button>
<button onclick="filter('bivalve')">Bivalves</button>
<button onclick="filter('amber')">Amber</button>
<button onclick="filter('plant')">Plants</button>
<button onclick="filter('wood')">Wood</button>
</div>

<div class="grid">

<!-- APC 000001 -->
<div class="card echinoid">
<img src="images/apc-000001.jpg">
<div class="content">
<span class="tag">Echinoidea</span>
<h2>APC-000001</h2>
<a href="pages/apc-000001.html">View Specimen</a>
</div>
</div>

<!-- APC 000002 -->
<div class="card echinoid">
<img src="images/apc-000002.jpg">
<div class="content">
<span class="tag">Echinoidea</span>
<h2>APC-000002</h2>
<a href="pages/apc-000002.html">View Specimen</a>
</div>
</div>

</div>

<script>
function filter(type){
    let cards = document.querySelectorAll('.card');

    cards.forEach(card => {
        if(type === 'all'){
            card.style.display = 'block';
        }
        else if(card.classList.contains(type)){
            card.style.display = 'block';
        }
        else{
            card.style.display = 'none';
        }
    });
}
</script>

</body>
</html>
